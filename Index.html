<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Creative Space</title>
    <!-- استدعاء خطوط جوجل بشكل جميل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a192f; /* أزرق غامق جداً للخلفية */
            color: #ffffff;
        }

        /* حاوية الـ 3D */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* واجهة النصوص فوق الـ 3D */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* للسماح بالتفاعل مع الـ 3D خلف النص */
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid #ff007f; /* وردي */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(255, 0, 127, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.1);
            max-width: 600px;
            width: 100%;
            pointer-events: auto; /* إعادة التفاعل للبطاقة */
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff; /* أبيض */
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
        }

        .phrase {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        /* الألوان المطلوبة متناسقة */
        .pink-text { color: #ff007f; } /* وردي */
        .blue-text { color: #00d4ff; } /* أزرق فاتح/مضيء متناسق مع الغامق */
        .white-text { color: #ffffff; } /* أبيض */

        .phrase:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- حاوية Three.js ثلاثية الأبعاد -->
    <div id="canvas-container"></div>

    <!-- النصوص المطلوبة -->
    <div class="content-overlay">
        <div class="card">
            <h1 class="pink-text">Aya hoblk</h1>
            <div class="phrase white-text">Iman boda cast</div>
            <div class="phrase blue-text">Nadouia m3ndkch</div>
            <div class="phrase pink-text">Mohamed speak luik</div>
        </div>
    </div>

    <!-- استدعاء مكتبة Three.js من الـ CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // إعداد المشهد ثلاثي الأبعاد (3D Scene)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // الكاميرا
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // الرندر (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // إنشاء جزيئات 3D متحركة (Particles) بالألوان المطلوبة
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 300;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        // الألوان بصيغة RGB (أزرق غامق، وردي، أبيض)
        const colors = [
            new THREE.Color('#00d4ff'), // أزرق مضيء
            new THREE.Color('#ff007f'), // وردي
            new THREE.Color('#ffffff')  // أبيض
        ];

        for(let i=0; i < particlesCount * 3; i+=3) {
            // الإحداثيات
            posArray[i] = (Math.random() - 0.5) * 10;
            posArray[i+1] = (Math.random() - 0.5) * 10;
            posArray[i+2] = (Math.random() - 0.5) * 10;

            // توزيع الألوان عشوائياً من القائمة
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            colorArray[i] = randomColor.r;
            colorArray[i+1] = randomColor.g;
            colorArray[i+2] = randomColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        // مظهر الجزيئات
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // تفاعل حركة الماوس لإعطاء تأثير 3D عميق
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (event.clientY - window.innerHeight / 2) * 0.001;
        });

        // الأنيميشن (الحركة المستمرة)
        const animate = () => {
            requestAnimationFrame(animate);

            // تدوير الجزيئات ببطء
            particlesMesh.rotation.y += 0.002;
            particlesMesh.rotation.x += 0.001;

            // ربط الحركة بالماوس بلطف
            particlesMesh.rotation.y += mouseX * 0.1;
            particlesMesh.rotation.x += mouseY * 0.1;

            renderer.render(scene, camera);
        };
        animate();

        // إعادة ضبط الحجم عند تغيير حجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
